# Skopiuj do repo: djdamsza/njr-konwerter
#   .github/workflows/njr-konwerter-build.yml
#   .github/macos-entitlements.plist  (z pliku macos-entitlements.plist w tym katalogu docs)
#
# === Sekrety GitHub (Settings → Secrets and variables → Actions) ===
# MACOS_CERTIFICATE        — base64 pliku .p12 (Developer ID Application)
# MACOS_CERTIFICATE_PWD    — hasło do .p12
# MACOS_SIGNING_IDENTITY   — np. "Developer ID Application: Imię Nazwisko (TEAMID)"
# APPLE_ID                 — e-mail Apple Developer
# APPLE_APP_SPECIFIC_PASSWORD — hasło aplikacji (appleid.apple.com → App-Specific Passwords)
# APPLE_TEAM_ID            — 10-znakowy Team ID
#
# Bez tych sekretów job na Macu zbuduje DMG, ale Gatekeeper zablokuje zwykły dwuklik (jak dotychczas).

name: Build NJR Konwerter

on:
  workflow_dispatch:
    inputs:
      upload_to_tag:
        description: "Wgraj binaria do istniejącego release (np. 1.0). Zostaw puste — tylko build + artefakty."
        required: false
        default: ""
  push:
    branches:
      - main
      - master
    tags:
      - 'njr-v*'
      - '1.*'
      - '2.*'
      - '3.*'
      - 'v1.*'
      - 'v2.*'
      - 'v3.*'
    paths:
      - 'editor/**'
      - 'tools/vdj-database-editor/**'
      - 'VERSION'
      - 'njr-konwerter-1.0/VERSION'
      - '.github/workflows/njr-konwerter-build.yml'
      - '.github/macos-entitlements.plist'

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows x64
            asset_suffix: windows-x64
          - os: macos-latest
            name: macOS Apple Silicon (arm64)
            asset_suffix: macos-arm64
          - os: macos-15-intel
            name: macOS Intel (x64)
            asset_suffix: macos-intel-x64

    steps:
      - uses: actions/checkout@v4

      - name: Wykryj katalog źródeł (editor vs VoteBattle)
        run: |
          if [ -f editor/njr.spec ]; then
            NJR_DIR=editor
            if [ -f VERSION ]; then
              VERSION_FILE=VERSION
            elif [ -f njr-konwerter-1.0/VERSION ]; then
              VERSION_FILE=njr-konwerter-1.0/VERSION
            else
              echo "Brak VERSION w korzeniu ani njr-konwerter-1.0/VERSION" >&2
              exit 1
            fi
            echo "Układ: repo njr-konwerter (editor/)"
          elif [ -f tools/vdj-database-editor/njr.spec ]; then
            NJR_DIR=tools/vdj-database-editor
            VERSION_FILE=njr-konwerter-1.0/VERSION
            echo "Układ: VoteBattle (tools/vdj-database-editor)"
          else
            echo "Nie znaleziono njr.spec w editor/ ani tools/vdj-database-editor/" >&2
            exit 1
          fi
          test -f "$NJR_DIR/requirements.txt"
          test -f "$VERSION_FILE"
          echo "NJR_DIR=$NJR_DIR" >> "$GITHUB_ENV"
          echo "VERSION_FILE=$VERSION_FILE" >> "$GITHUB_ENV"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            editor/requirements.txt
            tools/vdj-database-editor/requirements.txt

      - name: Zależności + PyInstaller
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r "$NJR_DIR/requirements.txt" pyinstaller

      - name: PyInstaller (onefile)
        run: |
          cd "$NJR_DIR"
          python -m PyInstaller njr.spec --clean --noconfirm

      - name: Wersja z pliku VERSION
        id: ver
        run: |
          VERSION="$(tr -d ' \t\r\n' < "$VERSION_FILE")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Import certyfikatu Apple (macOS)
        id: macsign
        if: runner.os == 'macOS'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          if [ -z "${MACOS_CERTIFICATE:-}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Brak sekretu MACOS_CERTIFICATE — DMG bez podpisu i notaryzacji (macOS może blokować program)."
            exit 0
          fi
          echo "$MACOS_CERTIFICATE" | base64 --decode > /tmp/build_cert.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import /tmp/build_cert.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm -f /tmp/build_cert.p12
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Pakuj artefakt (Windows / macOS)
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          SIGN_ID: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          mkdir -p _upload
          if [ "${{ runner.os }}" = "Windows" ]; then
            test -f "$NJR_DIR/dist/NJR-konwerter.exe"
            cp "$NJR_DIR/dist/NJR-konwerter.exe" "_upload/NJR-konwerter-${VERSION}-${{ matrix.asset_suffix }}.exe"
          else
            test -f "$NJR_DIR/dist/NJR-konwerter"
            STAGING="_dmg_root"
            rm -rf "$STAGING"
            mkdir -p "$STAGING"
            cp "$NJR_DIR/dist/NJR-konwerter" "$STAGING/NJR-konwerter"
            chmod +x "$STAGING/NJR-konwerter"
            ENT="$GITHUB_WORKSPACE/.github/macos-entitlements.plist"
            if [ "${{ steps.macsign.outputs.enabled }}" = "true" ] && [ -n "$SIGN_ID" ] && [ -f "$ENT" ]; then
              codesign --force --deep --timestamp --options runtime \
                --entitlements "$ENT" \
                --sign "$SIGN_ID" \
                "$STAGING/NJR-konwerter"
            fi
            DMG="_upload/NJR-konwerter-${VERSION}-${{ matrix.asset_suffix }}.dmg"
            hdiutil create -volname "NJR Konwerter" -srcfolder "$STAGING" -ov -format UDZO "$DMG"
            rm -rf "$STAGING"
            if [ "${{ steps.macsign.outputs.enabled }}" = "true" ] && [ -n "$SIGN_ID" ]; then
              codesign --force --timestamp --sign "$SIGN_ID" "$DMG"
            fi
            if [ "${{ steps.macsign.outputs.enabled }}" = "true" ] && \
               [ -n "$APPLE_ID" ] && [ -n "$APPLE_APP_SPECIFIC_PASSWORD" ] && [ -n "$APPLE_TEAM_ID" ]; then
              xcrun notarytool submit "$DMG" \
                --apple-id "$APPLE_ID" \
                --team-id "$APPLE_TEAM_ID" \
                --password "$APPLE_APP_SPECIFIC_PASSWORD" \
                --wait
              xcrun stapler staple "$DMG"
            elif [ "${{ steps.macsign.outputs.enabled }}" = "true" ]; then
              echo "::warning::Brak APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID — DMG nie został wysłany do notaryzacji."
            fi
          fi
          ls -la _upload

      - uses: actions/upload-artifact@v4
        with:
          name: njr-${{ matrix.asset_suffix }}
          path: _upload/*
          if-no-files-found: error

  release:
    name: GitHub Release (assety pod tag)
    needs: build
    if: >-
      !cancelled() && needs.build.result == 'success' && (
        (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && contains(github.repository, 'njr-konwerter'))
        || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && (startsWith(github.ref_name, 'njr-v') || startsWith(github.ref_name, '1.') || startsWith(github.ref_name, '2.') || startsWith(github.ref_name, '3.') || startsWith(github.ref_name, 'v1.') || startsWith(github.ref_name, 'v2.') || startsWith(github.ref_name, 'v3.')))
        || (github.event_name == 'workflow_dispatch' && github.event.inputs.upload_to_tag != '')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: njr-*
          merge-multiple: true

      - name: Spłaszcz pliki
        run: |
          mkdir -p flat
          find release-assets -type f -exec cp -v {} flat/ \;
          ls -la flat

      - name: Ustal tag GitHub Release
        id: rel
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          GIT_REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
          UPLOAD_TO_TAG: ${{ github.event.inputs.upload_to_tag }}
        run: |
          TAG=""
          if [[ "$EVENT_NAME" == "workflow_dispatch" && -n "$UPLOAD_TO_TAG" ]]; then
            TAG="$UPLOAD_TO_TAG"
          elif [[ "$GIT_REF" == "refs/heads/main" || "$GIT_REF" == "refs/heads/master" ]]; then
            TAG="1.0"
          elif [[ "$GIT_REF" == refs/tags/* ]]; then
            TAG="$REF_NAME"
          fi
          if [[ -z "$TAG" ]]; then
            echo "::error::Nie udało się ustalić tagu release."
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          name: NJR Konwerter ${{ steps.rel.outputs.tag }}
          draft: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: flat/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Linki do pobrania
        shell: bash
        env:
          TAG: ${{ steps.rel.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          echo "## Pobrania (tag $TAG)" >> "$GITHUB_STEP_SUMMARY"
          for f in flat/*; do
            [[ -f "$f" ]] || continue
            bn=$(basename "$f")
            echo "- https://github.com/${REPO}/releases/download/${TAG}/${bn}" >> "$GITHUB_STEP_SUMMARY"
          done
